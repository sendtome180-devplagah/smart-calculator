<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الآلة الحاسبة الذكية</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .calculator { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 330px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; font-size: 20px; }
        label { display: block; margin: 10px 0 5px; font-size: 14px; color: #666; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #45a049; }
        .result { margin-top: 20px; font-size: 18px; font-weight: bold; color: blue; min-height: 25px; }
        .credits { margin-top: 25px; font-size: 12px; color: #555; font-style: italic; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="calculator">
        <h2>=== آلة حاسبة بايثون الذكية ===</h2>
        
        <label>الرقم الأول:</label>
        <input type="number" id="num1" placeholder="أدخل الرقم الأول">

        <label>العملية الحسابية:</label>
        <select id="operation">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">×</option>
            <option value="/">÷</option>
        </select>

        <label>الرقم الثاني:</label>
        <input type="number" id="num2" placeholder="أدخل الرقم الثاني">

        <button id="btn_calc">احسب النتيجة</button>

        <div class="result" id="lbl_result"></div>

        <div class="credits">تصميم: أ. عبد الله علي المطرفي</div>
    </div>

    <script type="py" config='{"interpreter": "pyodide"}'>
from pyscript import document
from pyodide.ffi import create_proxy

def calculate(event):
    num1_input = document.querySelector("#num1").value
    num2_input = document.querySelector("#num2").value
    operation = document.querySelector("#operation").value
    result_div = document.querySelector("#lbl_result")
    
    if not num1_input or not num2_input:
        result_div.innerText = "تنبيه: الرجاء إدخال الأرقام أولاً"
        return

    try:
        num1 = float(num1_input)
        num2 = float(num2_input)
        
        if operation == "+":
            result = num1 + num2
            op_sign = "+"
        elif operation == "-":
            result = num1 - num2
            op_sign = "-"
        elif operation == "*":
            result = num1 * num2
            op_sign = "×"
        elif operation == "/":
            if num2 == 0:
                result_div.innerText = "خطأ: لا يمكن القسمة على صفر!"
                return
            result = num1 / num2
            op_sign = "÷"

        result_div.innerText = f"{num1} {op_sign} {num2} = {result}"
        
    except Exception as e:
        result_div.innerText = "خطأ: الرجاء إدخال أرقام صالحة"

calculate_proxy = create_proxy(calculate)
document.querySelector("#btn_calc").addEventListener("click", calculate_proxy)
    </script>
</body>
</html>
