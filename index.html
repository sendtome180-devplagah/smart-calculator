<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الآلة الحاسبة الذكية</title>
    <style>
        body { 
            font-family: 'Tahoma', 'Arial', sans-serif; 
            background-color: #1e1e1e; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .calculator { 
            background: #2d2d2d; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.3); 
            width: 340px; 
            text-align: center; 
            border: 1px solid #3d3d3d;
        }
        h2 { color: #ffffff; margin-bottom: 25px; font-size: 20px; font-weight: bold; text-align: center; direction: rtl; }
        label { display: block; margin: 12px 0 6px; font-size: 13px; color: #aaaaaa; text-align: right; direction: rtl; }
        
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            background-color: #3b3b3b;
            border: 1px solid #4d4d4d; 
            border-radius: 8px; 
            box-sizing: border-box; 
            text-align: center; 
            font-size: 16px; 
            color: white;
            outline: none;
        }
        input:focus { border-color: #4CAF50; }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #4CAF50; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background-color 0.3s; 
            margin-top: 10px;
            direction: rtl;
        }
        button:hover { background-color: #45a049; }
        
        /* ضبط صندوق النتيجة ليرص العناصر بصرياً من اليمين إلى اليسار تلقائياً */
        .result-box {
            margin-top: 25px;
            min-height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px; 
            font-size: 22px;
            font-weight: bold;
            color: #1E90FF;
            direction: rtl; /* إجبار الترتيب البصري أن يبدأ من اليمين للعين */
        }
        
        .credits { 
            margin-top: 30px; 
            font-size: 12px; 
            color: #777777; 
            border-top: 1px solid #3d3d3d; 
            padding-top: 15px; 
            direction: rtl;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <h2>=== الآلة الحاسبة الذكية ===</h2>
        
        <label>الرقم الأول:</label>
        <input type="number" id="num1" placeholder="أدخل الرقم الأول">

        <label>العملية الحسابية:</label>
        <select id="operation">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">×</option>
            <option value="/">÷</option>
        </select>

        <label>الرقم الثاني:</label>
        <input type="number" id="num2" placeholder="أدخل الرقم الثاني">

        <button onclick="calculate()">احسب النتيجة</button>

        <div class="result-box" id="lbl_result"></div>

        <div class="credits">تصميم: أ. عبد الله علي المطرفي</div>
    </div>

    <script>
        function calculate() {
            var num1Input = document.getElementById("num1").value;
            var num2Input = document.getElementById("num2").value;
            var operation = document.getElementById("operation").value;
            var resultDiv = document.getElementById("lbl_result");
            
            if (num1Input === "" || num2Input === "") {
                resultDiv.style.color = "#ff4444";
                resultDiv.innerHTML = "تنبيه: الرجاء إدخال الأرقام أولاً";
                return;
            }

            var num1 = parseFloat(num1Input);
            var num2 = parseFloat(num2Input);
            var result;
            var opSign;

            if (operation === "+") { result = num1 + num2; opSign = "+"; }
            else if (operation === "-") { result = num1 - num2; opSign = "-"; }
            else if (operation === "*") { result = num1 * num2; opSign = "×"; }
            else if (operation === "/") {
                if (num2 === 0) {
                    resultDiv.style.color = "#ff4444";
                    resultDiv.innerHTML = "خطأ: لا يمكن القسمة على صفر!";
                    return;
                }
                result = num1 / num2;
                opSign = "÷";
            }

            resultDiv.style.color = "#1E90FF";
            
            /* الصياغة الكلاسيكية الآمنة: رص المربعات بالترتيب الطبيعي الذي تطلبه */
            resultDiv.innerHTML = "<span>" + num1 + "</span> <span>" + opSign + "</span> <span>" + num2 + "</span> <span>=</span> <span>" + result + "</span>";
        }
    </script>
</body>
</html>
